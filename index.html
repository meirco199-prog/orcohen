<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="משפחת כהן"/>
<meta name="theme-color" content="#1A1A2E"/>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" type="image/svg+xml" href="icon.svg"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<title>משפחת אור כהן</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:system-ui,-apple-system,sans-serif;background:#F8F6FF;direction:rtl;min-height:100dvh;display:flex;justify-content:center}
#root{width:100%;max-width:430px;min-height:100dvh;display:flex;flex-direction:column;background:#F8F6FF}
button{font-family:inherit;cursor:pointer;border:none}
.scroll{flex:1;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch}
.nav{display:flex;background:#fff;border-top:1px solid #ECECEC;padding:8px 0 max(6px,env(safe-area-inset-bottom))}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;font-size:10px;font-weight:400;color:#999;background:none}
.nav button.on{font-weight:700}
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;border:1px solid #ECECEC}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.flash{text-align:center;font-size:13px;padding:10px;font-weight:600}
.pin-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:30px 20px;position:relative}
.dots{display:flex;gap:16px;margin:24px 0}
.dot{width:16px;height:16px;border-radius:50%;border:2px solid currentColor;transition:background .15s}
.dot.on{background:currentColor}
.pad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:280px}
.pb{height:64px;border-radius:16px;background:#fff;border:1.5px solid #E0E0E0;font-size:22px;font-weight:600;color:#1A1A2E;touch-action:manipulation}
.pb:active{background:#F0F0F0}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:36px;height:36px;border:3px solid #E0E0E0;border-top-color:#3DBDB5;border-radius:50%;animation:spin .8s linear infinite}
</style>
</head>
<body>
<div id="root"><div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;gap:16px"><div class="spin"></div><div style="color:#666;font-size:14px">מתחבר...</div></div></div>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
}
</script>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getDatabase,ref,onValue,set,remove}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
var app=initializeApp({databaseURL:"https://orcohen-baa42-default-rtdb.firebaseio.com"});
var DB=getDatabase(app);

// pts = נקודות כוללות (לפרסים, ממשיכות להצטבר)
// wpts = נקודות שבועיות (לדירוג בלבד, מתאפסות כל שבוע)

var KIDS=[
  {id:"adar", name:"אדר",  age:12,emoji:"🦁",color:"#FF6B6B",light:"#FFF0F0",dark:"#C0392B"},
  {id:"agam", name:"אגם",  age:10,emoji:"🦋",color:"#A29BFE",light:"#F0EEFF",dark:"#6C5CE7"},
  {id:"ariel",name:"אריאל",age:10,emoji:"🌸",color:"#FD79A8",light:"#FFF0F6",dark:"#C0165E"},
  {id:"itay", name:"איתי", age:14,emoji:"⚡", color:"#00B894",light:"#EDFAF6",dark:"#007A5E"},
];
var TASKS=[
  {id:"room",  label:"סידור חדר",      pts:1,emoji:"🛏️"},
  {id:"dish",  label:"כלים / מדיח",    pts:1,emoji:"🍽️"},
  {id:"hw",    label:"שיעורי בית",     pts:1,emoji:"📚"},
  {id:"trash", label:"אשפה / מיחזור", pts:1,emoji:"♻️"},
  {id:"cook",  label:"עזרה בבישול",    pts:1,emoji:"🍳"},
  {id:"dog",   label:"לינקה / כלב",    pts:1,emoji:"🐕"},
  {id:"wc",    label:"לנקות שירותים",  pts:2,emoji:"🚽"},
  {id:"light", label:"עזרה עם אור",    pts:1,emoji:"💡"},
  {id:"super", label:"עזרה בסופר",     pts:1,emoji:"🛒"},
  {id:"bags",  label:"סידור קניות",    pts:1,emoji:"🛍️"},
];
var GOOD=[
  {id:"help",  label:"עזרה לאח/אחות", pts:2,emoji:"🤝"},
  {id:"kind",  label:"אדיבות",         pts:1,emoji:"💛"},
  {id:"init",  label:"יוזמה",          pts:2,emoji:"⭐"},
  {id:"share", label:"שיתוף",          pts:1,emoji:"🎁"},
  {id:"give",  label:"ויתור",          pts:2,emoji:"🕊️"},
];
var BAD=[
  {id:"fight", label:"ריב",              pts:-2,emoji:"😤"},
  {id:"rude",  label:"חוצפה",            pts:-2,emoji:"🙄"},
  {id:"lie",   label:"שקר",             pts:-3,emoji:"🤥"},
  {id:"ign",   label:"התעלמות ממשימה",  pts:-1,emoji:"🚫"},
];
var PRIZES=[
  {id:"p1",label:"בחירת ארוחת ערב",shek:4,  emoji:"🍕"},
  {id:"p2",label:"שעה נוספת מסך",  shek:3,  emoji:"📱"},
  {id:"p3",label:"טיול בחירה",     shek:10, emoji:"🎡"},
  {id:"p4",label:"ג'אנק פוד",      shek:4,  emoji:"🍔"},
  {id:"p5",label:"לא לסדר חדר יום",shek:2,  emoji:"😴"},
  {id:"p6",label:"סרט בחירה",      shek:2,  emoji:"🎬"},
  {id:"p7",label:"צעצוע עד 100 ₪", shek:100,emoji:"🧸",bigPts:100},
  {id:"p8",label:"צעצוע עד 150 ₪", shek:150,emoji:"🎮",bigPts:150},
  {id:"p9",label:"המרה ל-200 ₪",   shek:200,emoji:"💵",bigPts:200},
  {id:"p10",label:"קונסולת משחקים",shek:999,emoji:"🕹️",bigPts:500},
  {id:"p11",label:"אייפון",         shek:999,emoji:"📱✨",bigPts:1000},
];

function p2s(p){return(p/5).toFixed(1);}
function s2p(s){return s*5;}

var zero={adar:0,agam:0,ariel:0,itay:0};
var live={pts:Object.assign({},zero),wpts:Object.assign({},zero),pend:{},hist:{},pins:{},photos:{}};
var S={v:"home",pFor:null,pMode:null,pIn:"",pFirst:"",pErr:"",
       kTab:"rep",kCat:"task",parTab:"dash",
       fl:null,flT:null,cKid:"",cLabel:"",cPts:"",cBonus:true};

function el(){return document.getElementById("root");}
function gk(id){return KIDS.find(function(k){return k.id===id;});}
function now(){return new Date().toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"});}
function uid(){return Date.now()+"_"+Math.random().toString(36).slice(2,6);}

function flash(msg,bg,tc){
  if(S.flT)clearTimeout(S.flT);
  S.fl={msg:msg,bg:bg||"#EDFAF6",tc:tc||"#00714F"};
  S.flT=setTimeout(function(){S.fl=null;render();},2500);
  render();
}
function pArr(){return Object.values(live.pend||{});}
function hArr(){return Object.values(live.hist||{}).sort(function(a,b){return(b.ts||0)-(a.ts||0);});}
function fSet(p,v){return set(ref(DB,p),v);}
function fDel(p){return remove(ref(DB,p));}

onValue(ref(DB,"pts"),function(s){if(s.val())live.pts=Object.assign({},zero,s.val());render();});
onValue(ref(DB,"wpts"),function(s){live.wpts=Object.assign({},zero,s.val()||{});render();});
onValue(ref(DB,"pend"),function(s){live.pend=s.val()||{};render();});
onValue(ref(DB,"hist"),function(s){live.hist=s.val()||{};render();});
onValue(ref(DB,"pins"),function(s){live.pins=s.val()||{};render();});
onValue(ref(DB,"photos"),function(s){live.photos=s.val()||{};render();});

function ava(k,sz){
  sz=sz||32;
  var ph=live.photos&&live.photos[k.id];
  if(ph)return'<img src="'+ph+'" style="width:'+sz+'px;height:'+sz+'px;border-radius:50%;object-fit:cover;border:2px solid '+k.color+'"/>';
  return'<div style="width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:'+k.light+';border:2px solid '+k.color+';display:flex;align-items:center;justify-content:center;font-size:'+Math.round(sz*.45)+'px">'+k.emoji+'</div>';
}

function badge(p){
  var pos=p>=0;
  return'<span style="font-weight:700;font-size:12px;color:'+(pos?"#00B894":"#FF6B6B")+';background:'+(pos?"#EDFAF6":"#FFF0F0")+';padding:3px 8px;border-radius:10px;border:1px solid '+(pos?"#00B89433":"#FF6B6B33")+'">'+(pos?"+":"")+p+'⭐</span>';
}

// דירוג שבועי לפי wpts
function lb(cur){
  var s=KIDS.slice().sort(function(a,b){return(live.wpts[b.id]||0)-(live.wpts[a.id]||0);});
  var mx=Math.max.apply(null,KIDS.map(function(x){return live.wpts[x.id]||0;}).concat([1]));
  return s.map(function(k,i){
    var ic=cur&&k.id===cur;
    return'<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:10px;background:'+(ic?"#fff":"rgba(255,255,255,0.5)")+';border-radius:12px;border:'+(ic?"2px solid "+k.color:"1px solid rgba(255,255,255,0.3)")+'">'
      +'<div style="font-size:18px;width:26px">'+["🥇","🥈","🥉","4️⃣"][i]+'</div>'
      +ava(k,32)
      +'<div style="flex:1"><div style="display:flex;justify-content:space-between;margin-bottom:3px">'
        +'<span style="font-weight:700;font-size:13px;color:#1A1A2E">'+k.name+(i===0?" 👑":"")+(ic?" (אני)":"")+'</span>'
        +'<span style="font-weight:700;font-size:12px;color:'+k.dark+'">'+(live.wpts[k.id]||0)+'⭐ השבוע</span>'
      +'</div><div style="height:5px;border-radius:3px;background:#F0EEF8;overflow:hidden">'
        +'<div style="width:'+((live.wpts[k.id]||0)/mx*100)+'%;height:100%;background:'+k.color+'"></div>'
      +'</div></div></div>';
  }).join("");
}

async function uploadPhoto(kid){
  var inp=document.createElement("input");
  inp.type="file";inp.accept="image/*";
  inp.onchange=function(e){
    var f=e.target.files[0];if(!f)return;
    var r=new FileReader();
    r.onload=function(ev){
      var img=new Image();
      img.onload=async function(){
        var c=document.createElement("canvas");
        var mx=200,sc=Math.min(mx/img.width,mx/img.height,1);
        c.width=img.width*sc;c.height=img.height*sc;
        c.getContext("2d").drawImage(img,0,0,c.width,c.height);
        await fSet("photos/"+kid,c.toDataURL("image/jpeg",0.7));
        flash("📸 תמונה עודכנה!","#EDFAF6","#00714F");
      };
      img.src=ev.target.result;
    };
    r.readAsDataURL(f);
  };
  inp.click();
}

// PIN
function openU(u){S.pFor=u;S.pIn="";S.pErr="";S.pFirst="";S.pMode=live.pins[u]?"enter":"set";S.v="pin";render();}
function pp(d){if(S.pIn.length>=4)return;S.pIn+=d;S.pErr="";render();if(S.pIn.length===4)setTimeout(ps,180);}
function pd(){S.pIn=S.pIn.slice(0,-1);S.pErr="";render();}
async function ps(){
  var p=S.pIn;
  if(S.pMode==="enter"){
    if(live.pins[S.pFor]===p){var u=S.pFor;S.v=u==="parent"?"parent":"kid_"+u;S.kTab="rep";S.kCat="task";S.parTab="dash";S.pIn="";S.pErr="";render();}
    else{S.pIn="";S.pErr="קוד שגוי, נסה שוב";render();}
  }else if(S.pMode==="set"){S.pFirst=p;S.pMode="confirm";S.pIn="";render();}
  else{
    if(p===S.pFirst){
      await fSet("pins/"+S.pFor,p);
      var u2=S.pFor;S.v=u2==="parent"?"parent":"kid_"+u2;S.kTab="rep";S.kCat="task";S.parTab="dash";
      S.pIn="";S.pErr="";S.pFirst="";render();
    }else{S.pIn="";S.pFirst="";S.pMode="set";S.pErr="הקודים לא תואמים";render();}
  }
}

function rPin(){
  var isP=S.pFor==="parent",k=isP?null:gk(S.pFor);
  var col=isP?"#fff":(k?k.color:"#3DBDB5"),bg=isP?"#1A1A2E":(k?k.light:"#F8F6FF");
  var em=isP?"👨‍👩":(k?k.emoji:""),nm=isP?"מאיר ודיאנה":(k?k.name:"");
  var ti=S.pMode==="enter"?"שלום "+nm+"!":S.pMode==="set"?"הגדרת PIN חדש":"אישור PIN";
  var su=S.pMode==="enter"?"הזן קוד PIN":S.pMode==="set"?nm+", בחר 4 ספרות":"הזן שוב לאישור";
  var dots=[0,1,2,3].map(function(i){return'<div class="dot'+(i<S.pIn.length?" on":"")+'" style="color:'+col+'"></div>';}).join("");
  var nums=[1,2,3,4,5,6,7,8,9].map(function(n){return'<button class="pb" onclick="window.W.pp(\''+n+'\')">'+n+'</button>';}).join("");
  el().innerHTML='<div class="pin-wrap" style="background:'+bg+'">'
    +'<button onclick="window.W.gh()" style="position:absolute;top:20px;right:20px;background:rgba(0,0,0,0.1);border-radius:50%;width:34px;height:34px;font-size:18px;color:'+(isP?"#fff":"#555")+'">‹</button>'
    +'<div style="font-size:48px;margin-bottom:8px">'+em+'</div>'
    +'<div style="font-size:20px;font-weight:800;color:'+(isP?"#fff":"#1A1A2E")+'">'+ti+'</div>'
    +'<div style="font-size:13px;color:'+(isP?"rgba(255,255,255,0.6)":"#888")+';margin-top:6px;text-align:center">'+su+'</div>'
    +(S.pErr?'<div style="color:#FF6B6B;font-size:13px;margin-top:8px;font-weight:600">'+S.pErr+'</div>':"")
    +'<div class="dots">'+dots+'</div>'
    +'<div class="pad">'+nums
      +'<button class="pb" style="background:transparent;border-color:transparent;pointer-events:none"></button>'
      +'<button class="pb" onclick="window.W.pp(\'0\')">0</button>'
      +'<button class="pb" style="font-size:18px;color:#999" onclick="window.W.pd()">⌫</button>'
    +'</div></div>';
}

function rHome(){
  var pc=pArr().length;
  var cards=KIDS.map(function(k){
    return'<div style="background:'+k.light+';border-radius:20px;padding:16px 12px;border:2px solid '+k.color+'55;text-align:center">'
      +'<button onclick="window.W.ou(\''+k.id+'\')" style="background:none;width:100%;touch-action:manipulation">'
        +'<div style="display:flex;justify-content:center;margin-bottom:8px">'+ava(k,56)+'</div>'
        +'<div style="font-weight:700;font-size:14px;color:'+k.dark+'">'+k.name+'</div>'
        +'<div style="font-size:11px;color:#888;margin-bottom:5px">גיל '+k.age+'</div>'
        +'<div style="background:'+k.color+';color:#fff;border-radius:12px;padding:3px 8px;font-weight:700;font-size:13px;margin-bottom:2px">'+(live.pts[k.id]||0)+'⭐ סה״כ</div>'
        +'<div style="font-size:11px;color:'+k.dark+';margin-bottom:2px">'+p2s(live.pts[k.id]||0)+' ₪ לפרסים</div>'
        +'<div style="font-size:10px;color:#aaa">השבוע: '+(live.wpts[k.id]||0)+'⭐</div>'
        +'<div style="font-size:10px;opacity:0.7;margin-top:2px;color:'+k.dark+'">'+(live.pins[k.id]?"🔒":"🔓")+'</div>'
      +'</button></div>';
  }).join("");
  el().innerHTML='<div style="display:flex;flex-direction:column;min-height:100dvh">'
    +'<div style="background:linear-gradient(135deg,#1A1A2E,#2D2D5E);padding:20px 16px 16px">'
      +'<div style="text-align:center;margin-bottom:14px"><div style="font-size:26px">✨</div><div style="font-size:20px;font-weight:800;color:#fff">משפחת אור כהן</div></div>'
      +'<div style="background:rgba(255,255,255,0.1);border-radius:16px;padding:14px">'
        +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'
          +'<div style="font-weight:700;font-size:14px;color:#fff">🏆 דירוג שבועי</div>'
          +'<div style="font-size:10px;color:rgba(255,255,255,0.5)">מתאפס ידנית ע״י ההורים</div>'
        +'</div>'+lb(null)+'</div></div>'
    +'<div class="scroll">'
      +'<div style="font-size:11px;font-weight:700;color:#999;letter-spacing:1px;margin-bottom:12px">הילדים</div>'
      +'<div class="g2" style="margin-bottom:20px">'+cards+'</div>'
      +'<div style="font-size:11px;font-weight:700;color:#999;letter-spacing:1px;margin-bottom:12px">הורים</div>'
      +'<button onclick="window.W.ou(\'parent\')" style="width:100%;background:#1A1A2E;border-radius:16px;padding:16px 20px;display:flex;align-items:center;gap:14px;touch-action:manipulation">'
        +'<div style="width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:22px">👨‍👩</div>'
        +'<div style="text-align:right"><div style="font-weight:700;font-size:15px;color:#fff">מאיר ודיאנה</div>'
        +'<div style="font-size:12px;color:rgba(255,255,255,0.5)">'+(live.pins["parent"]?"🔒 ":"🔓 ")+'ניהול · אישור · איפוס</div></div>'
        +(pc>0?'<div style="background:#FF6B6B;color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;margin-right:auto">'+pc+'</div>':"")
      +'</button>'
    +'</div></div>';
}

function rKid(kid){
  var k=gk(kid),p=live.pts[kid]||0,wp=live.wpts[kid]||0,tab=S.kTab,cat=S.kCat;
  var myP=pArr().filter(function(x){return x.kid===kid;});
  var myH=hArr().filter(function(x){return x.kid===kid;});
  var fl=S.fl?'<div class="flash" style="background:'+S.fl.bg+';color:'+S.fl.tc+'">'+S.fl.msg+'</div>':"";
  var c="";

  if(tab==="rep"){
    var pr="";
    if(myP.length>0){
      pr='<div class="card" style="border:1px solid '+k.color+'44;margin-bottom:12px">'
        +'<div style="font-size:12px;font-weight:700;color:#666;margin-bottom:8px">⏳ ממתין לאישור</div>'
        +myP.map(function(x){
          return'<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #F5F5F5">'
            +'<span style="font-size:13px">'+x.emoji+' '+x.label+'</span>'
            +'<div style="display:flex;gap:8px;align-items:center">'+badge(x.pts)
            +'<button onclick="window.W.dp(\''+x.id+'\')" style="background:#FFF0F0;color:#FF6B6B;width:30px;height:30px;border-radius:50%;font-size:16px;display:flex;align-items:center;justify-content:center;touch-action:manipulation">×</button>'
            +'</div></div>';
        }).join("")+'</div>';
    }
    var items=cat==="task"?TASKS:GOOD;
    var cb=[["task","🛏️","מטלות"],["good","💛","התנהגות"]].map(function(a){
      return'<button onclick="window.W.skc(\''+a[0]+'\')" style="flex:1;padding:9px 4px;border-radius:12px;border:1.5px solid '+(cat===a[0]?k.color:"#E0E0E0")+';background:'+(cat===a[0]?k.color:"#fff")+';color:'+(cat===a[0]?"#fff":"#666")+';font-weight:600;font-size:11px;touch-action:manipulation">'+a[1]+' '+a[2]+'</button>';
    }).join("");
    var ib=items.map(function(item){
      return'<button onclick="window.W.rep(\''+kid+'\',\''+item.id+'\',\''+cat+'\')" style="background:#fff;border-radius:14px;padding:14px 10px;border:1px solid '+k.color+'44;text-align:center;display:flex;flex-direction:column;align-items:center;gap:5px;width:100%;touch-action:manipulation">'
        +'<span style="font-size:22px">'+item.emoji+'</span>'
        +'<span style="font-size:11px;font-weight:500;color:#1A1A2E;line-height:1.3">'+item.label+'</span>'
        +badge(item.pts)+'</button>';
    }).join("");

    await fSet("hist/"+hid,{id:hid,kid:kid,type:S.cBonus?"bonus":"bad",label:label,pts:pts,emoji:pts>0?"🌟":"⚠️",time:now(),ts:Date.now()});
    S.cKid="";S.cLabel="";S.cPts="";
    flash(pts>0?"✅ בונוס נוסף!":"🚫 עונש הוחל!",pts>0?"#EDFAF6":"#FFF0F0",pts>0?"#00714F":"#C0392B");
  },
  qb:async function(itemId){
    var item=BAD.find(function(x){return x.id===itemId;});
    if(!S.cKid){flash("בחר ילד קודם","#FFF9E6","#8D6E00");return;}
    var kid=S.cKid;
    await fSet("pts/"+kid,Math.max(0,(live.pts[kid]||0)+item.pts));
    await fSet("wpts/"+kid,Math.max(0,(live.wpts[kid]||0)+item.pts));
    var hid=uid();
    await fSet("hist/"+hid,{id:hid,kid:kid,type:"bad",label:item.label,pts:item.pts,emoji:item.emoji,time:now(),ts:Date.now()});
    flash(item.emoji+" "+item.label+" הוחל","#FFF0F0","#C0392B");
  },
  rdm:async function(kid,prizeId){
    var pr=PRIZES.find(function(x){return x.id===prizeId;});
    var need=pr.bigPts||s2p(pr.shek),p=live.pts[kid]||0;
    if(p<need){flash("חסרות "+(need-p)+" נקודות 😕","#FFF0F0","#C0392B");return;}
    if(pr.bigPts>=500&&!confirm("פרס גדול! לאשר עם ההורים?")){return;}
    await fSet("pts/"+kid,p-need);
    var hid=uid();
    await fSet("hist/"+hid,{id:hid,kid:kid,label:"פרס: "+pr.label,pts:-need,emoji:pr.emoji,time:now(),ts:Date.now()});
    flash("🎉 "+pr.label+"!","#FFF9E6","#8D6E00");
  },
  rpin:async function(kid){
    if(!confirm("לאפס PIN של "+gk(kid).name+"?"))return;
    await fDel("pins/"+kid);
    flash("🔑 PIN אופס","#EDFAF6","#00714F");
  },
  resetWeek:async function(){
    if(!confirm("לאפס את הדירוג השבועי?\n(נקודות הפרסים לא יושפעו)"))return;
    // מאפס רק wpts — pts נשארים בעינם
    await fSet("wpts",{adar:0,agam:0,ariel:0,itay:0});
    flash("🏆 דירוג שבועי אופס! נקודות הפרסים נשמרו ✅","#FFF9E6","#8D6E00");
  },
  ra:async function(){
    if(!confirm("לאפס הכל לגמרי?\n(גם נקודות פרסים וגם דירוג שבועי)"))return;
    await fSet("pts",{adar:0,agam:0,ariel:0,itay:0});
    await fSet("wpts",{adar:0,agam:0,ariel:0,itay:0});
    await fSet("pend",null);
    await fSet("hist",null);
    flash("🔄 הכל אופס!","#F0EEFF","#6C5CE7");
  },
  dh:async function(id){
    var item=hArr().find(function(x){return x.id===id;});
    if(!item)return;
    await fSet("pts/"+item.kid,Math.max(0,(live.pts[item.kid]||0)-item.pts));
    await fSet("wpts/"+item.kid,Math.max(0,(live.wpts[item.kid]||0)-item.pts));
    await fDel("hist/"+id);
    flash("🗑️ נמחק","#F0EEFF","#6C5CE7");
  },
  ch:async function(){
    if(!confirm("למחוק את כל ההיסטוריה?"))return;
    await fSet("hist",null);
  },
  rep:async function(kid,itemId,cat){
    var items=cat==="task"?TASKS:GOOD;
    var item=items.find(function(x){return x.id===itemId;});
    if(!item)return;
    var pid=uid();
    await fSet("pend/"+pid,{id:pid,kid:kid,type:cat,label:item.label,pts:item.pts,emoji:item.emoji,time:now(),ts:Date.now()});
    flash(item.emoji+" "+item.label+" נשלח לאישור ⏳","#EDFAF6","#00714F");
  }
};
</script>
</body>
</html>
