<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>

<title>ОъОЕОцОЌОф ОљОЋОе ОЏОћОЪ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:system-ui,-apple-system,sans-serif;background:#F8F6FF;direction:rtl;min-height:100dvh;display:flex;justify-content:center}
#root{width:100%;max-width:430px;min-height:100dvh;display:flex;flex-direction:column;background:#F8F6FF}
button{font-family:inherit;cursor:pointer;border:none}
.scroll{flex:1;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch}
.nav{display:flex;background:#fff;border-top:1px solid #ECECEC;padding:8px 0 max(6px,env(safe-area-inset-bottom))}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;font-size:10px;font-weight:400;color:#999;background:none}
.nav button.on{font-weight:700}
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;border:1px solid #ECECEC}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.flash{text-align:center;font-size:13px;padding:10px;font-weight:600}
.pin-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:30px 20px;position:relative}
.dots{display:flex;gap:16px;margin:24px 0}
.dot{width:16px;height:16px;border-radius:50%;border:2px solid currentColor;transition:background .15s}
.dot.on{background:currentColor}
.pad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:280px}
.pb{height:64px;border-radius:16px;background:#fff;border:1.5px solid #E0E0E0;font-size:22px;font-weight:600;color:#1A1A2E;touch-action:manipulation}
.pb:active{background:#F0F0F0}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:36px;height:36px;border:3px solid #E0E0E0;border-top-color:#3DBDB5;border-radius:50%;animation:spin .8s linear infinite}
</style>
</head>
<body>
<div id="root"><div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;gap:16px"><div class="spin"></div><div style="color:#666;font-size:14px">ОъОфОЌОЉОе...</div></div></div>
<script type="module">

var DB=getDatabase(app);

  {id:"ariel",name:"ОљОеОЎОљОю",age:10,emoji:"­ЪїИ",color:"#FD79A8",light:"#FFF0F6",dark:"#C0165E"},

  {id:"hw",    label:"ОЕОЎОбОЋОеОЎ ОЉОЎОф",     pts:1,emoji:"­ЪЊџ"},
  {id:"trash", label:"ОљОЕОцОћ / ОъОЎОЌОќОЋОе", pts:1,emoji:"РЎ╗№ИЈ"},
  {id:"cook",  label:"ОбОќОеОћ ОЉОЉОЎОЕОЋОю",    pts:1,emoji:"­ЪЇ│"},
  {id:"dog",   label:"ОюОЎОаОДОћ / ОЏОюОЉ",    pts:1,emoji:"­ЪљЋ"},
  {id:"wc",    label:"ОюОаОДОЋОф ОЕОЎОеОЋОфОЎОЮ",  pts:2,emoji:"­Ъџй"},

  {id:"super", label:"ОбОќОеОћ ОЉОАОЋОцОе",     pts:1,emoji:"­ЪЏњ"},
  {id:"bags",  label:"ОАОЎОЊОЋОе ОДОаОЎОЋОф",    pts:1,emoji:"­ЪЏЇ№ИЈ"},
];
var GOOD=[
  {id:"help",  label:"ОбОќОеОћ ОюОљОЌ/ОљОЌОЋОф", pts:2,emoji:"­ЪцЮ"},
  {id:"kind",  label:"ОљОЊОЎОЉОЋОф",         pts:1,emoji:"­ЪњЏ"},
  {id:"init",  label:"ОЎОЋОќОъОћ",          pts:2,emoji:"РГљ"},
  {id:"share", label:"ОЕОЎОфОЋОБ",          pts:1,emoji:"­ЪјЂ"},
  {id:"give",  label:"ОЋОЎОфОЋОе",          pts:2,emoji:"­ЪЋі№ИЈ"},

var BAD=[

  {id:"rude",  label:"ОЌОЋОдОцОћ",            pts:-2,emoji:"­ЪЎё"},
  {id:"lie",   label:"ОЕОДОе",             pts:-3,emoji:"­ЪцЦ"},
  {id:"ign",   label:"ОћОфОбОюОъОЋОф ОъОъОЕОЎОъОћ",  pts:-1,emoji:"­ЪџФ"},
];
var PRIZES=[
  {id:"p1",label:"ОЉОЌОЎОеОф ОљОеОЋОЌОф ОбОеОЉ",shek:4,  emoji:"­ЪЇЋ"},
  {id:"p2",label:"ОЕОбОћ ОаОЋОАОцОф ОъОАОџ",  shek:3,  emoji:"­ЪЊ▒"},
  {id:"p3",label:"ОўОЎОЋОю ОЉОЌОЎОеОћ",     shek:10, emoji:"­ЪјА"},
  {id:"p4",label:"Оњ'ОљОаОД ОцОЋОЊ",      shek:4,  emoji:"­ЪЇћ"},
  {id:"p5",label:"ОюОљ ОюОАОЊОе ОЌОЊОе ОЎОЋОЮ",shek:2,  emoji:"­Ъў┤"},
  {id:"p6",label:"ОАОеОў ОЉОЌОЎОеОћ",      shek:2,  emoji:"­Ъјг"},
  {id:"p7",label:"ОдОбОдОЋОб ОбОЊ 100 Рѓф", shek:100,emoji:"­ЪДИ",bigPts:100},
  {id:"p8",label:"ОдОбОдОЋОб ОбОЊ 150 Рѓф", shek:150,emoji:"­Ъј«",bigPts:150},
  {id:"p9",label:"ОћОъОеОћ Ою-200 Рѓф",   shek:200,emoji:"­Ъњх",bigPts:200},
  {id:"p10",label:"ОДОЋОаОАОЋОюОф ОъОЕОЌОДОЎОЮ",shek:999,emoji:"­ЪЋ╣№ИЈ",bigPts:500},

function p2s(p){return(p/5).toFixed(1);}
function s2p(s){return s*5;}

var zero={adar:0,agam:0,ariel:0,itay:0};
var live={pts:Object.assign({},zero),wpts:Object.assign({},zero),pend:{},hist:{},pins:{},photos:{}};
var S={v:"home",pFor:null,pMode:null,pIn:"",pFirst:"",pErr:"",
       kTab:"rep",kCat:"task",parTab:"dash",
       fl:null,flT:null,cKid:"",cLabel:"",cPts:"",cBonus:true};

function el(){return document.getElementById("root");}
function gk(id){return KIDS.find(function(k){return k.id===id;});}
function now(){return new Date().toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"});}
function uid(){return Date.now()+"_"+Math.random().toString(36).slice(2,6);}

function flash(msg,bg,tc){
  if(S.flT)clearTimeout(S.flT);
  S.fl={msg:msg,bg:bg||"#EDFAF6",tc:tc||"#00714F"};
  S.flT=setTimeout(function(){S.fl=null;render();},2500);
  render();
}
function pArr(){return Object.values(live.pend||{});}
function hArr(){return Object.values(live.hist||{}).sort(function(a,b){return(b.ts||0)-(a.ts||0);});}
function fSet(p,v){return set(ref(DB,p),v);}
function fDel(p){return remove(ref(DB,p));}

onValue(ref(DB,"pts"),function(s){if(s.val())live.pts=Object.assign({},zero,s.val());render();});
onValue(ref(DB,"wpts"),function(s){live.wpts=Object.assign({},zero,s.val()||{});render();});
onValue(ref(DB,"pend"),function(s){live.pend=s.val()||{};render();});
onValue(ref(DB,"hist"),function(s){live.hist=s.val()||{};render();});
onValue(ref(DB,"pins"),function(s){live.pins=s.val()||{};render();});
onValue(ref(DB,"photos"),function(s){live.photos=s.val()||{};render();});

function ava(k,sz){
  sz=sz||32;
  var ph=live.photos&&live.photos[k.id];
  if(ph)return'<img src="'+ph+'" style="width:'+sz+'px;height:'+sz+'px;border-radius:50%;object-fit:cover;border:2px solid '+k.color+'"/>';
  return'<div style="width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:'+k.light+';border:2px solid '+k.color+';display:flex;align-items:center;justify-content:center;font-size:'+Math.round(sz*.45)+'px">'+k.emoji+'</div>';
}

function badge(p){
  var pos=p>=0;
  return'<span style="font-weight:700;font-size:12px;color:'+(pos?"#00B894":"#FF6B6B")+';background:'+(pos?"#EDFAF6":"#FFF0F0")+';padding:3px 8px;border-radius:10px;border:1px solid '+(pos?"#00B89433":"#FF6B6B33")+'">'+(pos?"+":"")+p+'РГљ</span>';
}

// ОЊОЎОеОЋОњ ОЕОЉОЋОбОЎ ОюОцОЎ wpts
function lb(cur){
  var s=KIDS.slice().sort(function(a,b){return(live.wpts[b.id]||0)-(live.wpts[a.id]||0);});
  var mx=Math.max.apply(null,KIDS.map(function(x){return live.wpts[x.id]||0;}).concat([1]));
  return s.map(function(k,i){
    var ic=cur&&k.id===cur;
    return'<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:10px;background:'+(ic?"#fff":"rgba(255,255,255,0.5)")+';border-radius:12px;border:'+(ic?"2px solid "+k.color:"1px solid rgba(255,255,255,0.3)")+'">'
      +'<div style="font-size:18px;width:26px">'+["­ЪЦЄ","­ЪЦѕ","­ЪЦЅ","4№ИЈРЃБ"][i]+'</div>'
      +ava(k,32)
      +'<div style="flex:1"><div style="display:flex;justify-content:space-between;margin-bottom:3px">'
        +'<span style="font-weight:700;font-size:13px;color:#1A1A2E">'+k.name+(i===0?" ­ЪЉЉ":"")+(ic?" (ОљОаОЎ)":"")+'</span>'
        +'<span style="font-weight:700;font-size:12px;color:'+k.dark+'">'+(live.wpts[k.id]||0)+'РГљ ОћОЕОЉОЋОб</span>'
      +'</div><div style="height:5px;border-radius:3px;background:#F0EEF8;overflow:hidden">'
        +'<div style="width:'+((live.wpts[k.id]||0)/mx*100)+'%;height:100%;background:'+k.color+'"></div>'
      +'</div></div></div>';
  }).join("");
}

async function uploadPhoto(kid){
  var inp=document.createElement("input");
  inp.type="file";inp.accept="image/*";
  inp.onchange=function(e){
    var f=e.target.files[0];if(!f)return;
    var r=new FileReader();
    r.onload=function(ev){
      var img=new Image();
      img.onload=async function(){
        var c=document.createElement("canvas");
        var mx=200,sc=Math.min(mx/img.width,mx/img.height,1);
        c.width=img.width*sc;c.height=img.height*sc;
        c.getContext("2d").drawImage(img,0,0,c.width,c.height);
        await fSet("photos/"+kid,c.toDataURL("image/jpeg",0.7));
        flash("­ЪЊИ ОфОъОЋОаОћ ОбОЋОЊОЏОаОћ!","#EDFAF6","#00714F");
      };
      img.src=ev.target.result;
    };
    r.readAsDataURL(f);
  };
  inp.click();
}

// PIN
function openU(u){S.pFor=u;S.pIn="";S.pErr="";S.pFirst="";S.pMode=live.pins[u]?"enter":"set";S.v="pin";render();}
function pp(d){if(S.pIn.length>=4)return;S.pIn+=d;S.pErr="";render();if(S.pIn.length===4)setTimeout(ps,180);}
function pd(){S.pIn=S.pIn.slice(0,-1);S.pErr="";render();}
async function ps(){
  var p=S.pIn;
  if(S.pMode==="enter"){
    if(live.pins[S.pFor]===p){var u=S.pFor;S.v=u==="parent"?"parent":"kid_"+u;S.kTab="rep";S.kCat="task";S.parTab="dash";S.pIn="";S.pErr="";render();}
    else{S.pIn="";S.pErr="ОДОЋОЊ ОЕОњОЋОЎ, ОаОАОћ ОЕОЋОЉ";render();}
  }else if(S.pMode==="set"){S.pFirst=p;S.pMode="confirm";S.pIn="";render();}
  else{
    if(p===S.pFirst){
      await fSet("pins/"+S.pFor,p);
      var u2=S.pFor;S.v=u2==="parent"?"parent":"kid_"+u2;S.kTab="rep";S.kCat="task";S.parTab="dash";
      S.pIn="";S.pErr="";S.pFirst="";render();
    }else{S.pIn="";S.pFirst="";S.pMode="set";S.pErr="ОћОДОЋОЊОЎОЮ ОюОљ ОфОЋОљОъОЎОЮ";render();}
  }
}

function rPin(){
  var isP=S.pFor==="parent",k=isP?null:gk(S.pFor);
  var col=isP?"#fff":(k?k.color:"#3DBDB5"),bg=isP?"#1A1A2E":(k?k.light:"#F8F6FF");
  var em=isP?"­ЪЉеРђЇ­ЪЉЕ":(k?k.emoji:""),nm=isP?"ОъОљОЎОе ОЋОЊОЎОљОаОћ":(k?k.name:"");
  var ti=S.pMode==="enter"?"ОЕОюОЋОЮ "+nm+"!":S.pMode==="set"?"ОћОњОЊОеОф PIN ОЌОЊОЕ":"ОљОЎОЕОЋОе PIN";
  var su=S.pMode==="enter"?"ОћОќОЪ ОДОЋОЊ PIN":S.pMode==="set"?nm+", ОЉОЌОе 4 ОАОцОеОЋОф":"ОћОќОЪ ОЕОЋОЉ ОюОљОЎОЕОЋОе";
  var dots=[0,1,2,3].map(function(i){return'<div class="dot'+(i<S.pIn.length?" on":"")+'" style="color:'+col+'"></div>';}).join("");
  var nums=[1,2,3,4,5,6,7,8,9].map(function(n){return'<button class="pb" onclick="window.W.pp(\''+n+'\')">'+n+'</button>';}).join("");
  el().innerHTML='<div class="pin-wrap" style="background:'+bg+'">'
    +'<button onclick="window.W.gh()" style="position:absolute;top:20px;right:20px;background:rgba(0,0,0,0.1);border-radius:50%;width:34px;height:34px;font-size:18px;color:'+(isP?"#fff":"#555")+'">Рђ╣</button>'
    +'<div style="font-size:48px;margin-bottom:8px">'+em+'</div>'
    +'<div style="font-size:20px;font-weight:800;color:'+(isP?"#fff":"#1A1A2E")+'">'+ti+'</div>'
    +'<div style="font-size:13px;color:'+(isP?"rgba(255,255,255,0.6)":"#888")+';margin-top:6px;text-align:center">'+su+'</div>'
    +(S.pErr?'<div style="color:#FF6B6B;font-size:13px;margin-top:8px;font-weight:600">'+S.pErr+'</div>':"")
    +'<div class="dots">'+dots+'</div>'
    +'<div class="pad">'+nums
      +'<button class="pb" style="background:transparent;border-color:transparent;pointer-events:none"></button>'
      +'<button class="pb" onclick="window.W.pp(\'0\')">0</button>'
      +'<button class="pb" style="font-size:18px;color:#999" onclick="window.W.pd()">РїФ</button>'
    +'</div></div>';
}

function rHome(){

  var cards=KIDS.map(function(k){

        +'</div>'+lb(null)+'</div></div>'
    +'<div class="scroll">'
      +'<div style="font-size:11px;font-weight:700;color:#999;letter-spacing:1px;margin-bottom:12px">ОћОЎОюОЊОЎОЮ</div>'
      +'<div class="g2" style="margin-bottom:20px">'+cards+'</div>'
      +'<div style="font-size:11px;font-weight:700;color:#999;letter-spacing:1px;margin-bottom:12px">ОћОЋОеОЎОЮ</div>'
      +'<button onclick="window.W.ou(\'parent\')" style="width:100%;background:#1A1A2E;border-radius:16px;padding:16px 20px;display:flex;align-items:center;gap:14px;touch-action:manipulation">'
        +'<div style="width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:22px">­ЪЉеРђЇ­ЪЉЕ</div>'

function rKid(kid){
  var k=gk(kid),p=live.pts[kid]||0,wp=live.wpts[kid]||0,tab=S.kTab,cat=S.kCat;

        return'<div style="background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:8px;border:1px solid #ECECEC;display:flex;align-items:center;gap:10px">'
          +'<div style="width:30px;height:30px;border-radius:50%;background:'+k.light+';display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">'+k.emoji+'</div>'
          +'<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500;color:#1A1A2E">'+k.name+' ┬и '+h.emoji+' '+h.label+'</div><div style="font-size:11px;color:#999">'+h.time+'</div></div>'
          +badge(h.pts)
          +'<button onclick="window.W.dh(\''+h.id+'\')" style="background:#FFF0F0;color:#FF6B6B;min-width:30px;width:30px;height:30px;border-radius:50%;font-size:16px;display:flex;align-items:center;justify-content:center;touch-action:manipulation;flex-shrink:0">├Ќ</button>'
        +'</div>';
      }).join(""));
  }

  var nav=[["dash","­ЪЈа","ОеОљОЕОЎ"],["pend","РЈ│","ОљОЎОЕОЋОе"+(pa.length>0?" ("+pa.length+")":"")],["add","РъЋ","ОћОЋОАОБ"],["hist","­ЪЊІ","ОћОЎОАОўОЋОеОЎОћ"]].map(function(a){
    return'<button class="'+(tab===a[0]?"on":"")+'" style="color:'+(tab===a[0]?"#1A1A2E":"#999")+'" onclick="window.W.spt(\''+a[0]+'\')">'+a[1]+'<br>'+a[2]+'</button>';
  }).join("");

  el().innerHTML='<div style="display:flex;flex-direction:column;min-height:100dvh">'
    +'<div style="background:#1A1A2E;padding:14px 20px 10px;display:flex;align-items:center;gap:10px">'
      +'<button onclick="window.W.gh()" style="background:rgba(255,255,255,0.15);color:#fff;width:30px;height:30px;border-radius:50%;font-size:16px;touch-action:manipulation">Рђ╣</button>'
      +'<div style="flex:1"><div style="font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:1px">PARENT MODE</div><div style="font-size:15px;font-weight:700;color:#fff">ОъОљОЎОе ОЋОЊОЎОљОаОћ ­ЪЉеРђЇ­ЪЉЕРђЇ­ЪЉДРђЇ­ЪЉд</div></div>'
      +'<button onclick="window.W.ra()" style="background:rgba(255,100,100,0.25);border:1px solid rgba(255,100,100,0.4);color:#ffaaaa;font-size:11px;padding:5px 10px;border-radius:10px;touch-action:manipulation">­Ъћё ОљОЎОцОЋОА ОћОЏОю</button>'
    +'</div>'+fl
    +'<div class="scroll" style="background:#F8F6FF">'+c+'</div>'
    +'<div class="nav">'+nav+'</div>'
  +'</div>';
}

function render(){
  if(S.v==="pin")rPin();
  else if(S.v==="home")rHome();
  else if(S.v==="parent")rParent();
  else rKid(S.v.replace("kid_",""));
}

window.W={
  gh:function(){S.v="home";render();},
  ou:openU,pp:pp,pd:pd,
  skt:function(t){S.kTab=t;render();},
  skc:function(c){S.kCat=c;render();},
  spt:function(t){S.parTab=t;render();},
  sck:function(id){S.cKid=id;render();},
  sb:function(v){S.cBonus=v;render();},
  uph:uploadPhoto,
  delph:async function(kid){await fDel("photos/"+kid);flash("­ЪЌЉ№ИЈ ОфОъОЋОаОћ ОаОъОЌОДОћ","#F0EEFF","#6C5CE7");},
  dp:async function(id){await fDel("pend/"+id);},
  apr:async function(id){
    var item=pArr().find(function(x){return x.id===id;});
    if(!item)return;
    // ОбОЊОЏОЪ ОњОЮ pts (ОюОцОеОАОЎОЮ) ОЋОњОЮ wpts (ОЕОЉОЋОбОЎ)
    await fSet("pts/"+item.kid,Math.max(0,(live.pts[item.kid]||0)+item.pts));
    await fSet("wpts/"+item.kid,Math.max(0,(live.wpts[item.kid]||0)+item.pts));
    var hid=uid();
    await fSet("hist/"+hid,Object.assign({},item,{id:hid,time:now(),ts:Date.now()}));
    await fDel("pend/"+id);
  },
  rej:async function(id){await fDel("pend/"+id);},
  ac:async function(){
    var kid=S.cKid;
    var el_l=document.getElementById("il"),el_p=document.getElementById("ip");
    var label=el_l?el_l.value.trim():S.cLabel.trim();
    var raw=parseInt(el_p?el_p.value:S.cPts);
    if(!kid||!label||isNaN(raw)||raw<=0)return;
    var pts=S.cBonus?raw:-raw;
    await fSet("pts/"+kid,Math.max(0,(live.pts[kid]||0)+pts));
    await fSet("wpts/"+kid,Math.max(0,(live.wpts[kid]||0)+pts));
    var hid=uid();
    await fSet("hist/"+hid,{id:hid,kid:kid,type:S.cBonus?"bonus":"bad",label:label,pts:pts,emoji:pts>0?"­ЪїЪ":"Рџа№ИЈ",time:now(),ts:Date.now()});
    S.cKid="";S.cLabel="";S.cPts="";
    flash(pts>0?"РюЁ ОЉОЋОаОЋОА ОаОЋОАОБ!":"­ЪџФ ОбОЋОаОЕ ОћОЋОЌОю!",pts>0?"#EDFAF6":"#FFF0F0",pts>0?"#00714F":"#C0392B");
  },
  qb:async function(itemId){
    var item=BAD.find(function(x){return x.id===itemId;});
    if(!S.cKid){flash("ОЉОЌОе ОЎОюОЊ ОДОЋОЊОЮ","#FFF9E6","#8D6E00");return;}
    var kid=S.cKid;
    await fSet("pts/"+kid,Math.max(0,(live.pts[kid]||0)+item.pts));
    await fSet("wpts/"+kid,Math.max(0,(live.wpts[kid]||0)+item.pts));
    var hid=uid();
    await fSet("hist/"+hid,{id:hid,kid:kid,type:"bad",label:item.label,pts:item.pts,emoji:item.emoji,time:now(),ts:Date.now()});
    flash(item.emoji+" "+item.label+" ОћОЋОЌОю","#FFF0F0","#C0392B");
  },
  rdm:async function(kid,prizeId){
    var pr=PRIZES.find(function(x){return x.id===prizeId;});
    var need=pr.bigPts||s2p(pr.shek),p=live.pts[kid]||0;
    if(p<need){flash("ОЌОАОеОЋОф "+(need-p)+" ОаОДОЋОЊОЋОф ­ЪўЋ","#FFF0F0","#C0392B");return;}
    if(pr.bigPts>=500&&!confirm("ОцОеОА ОњОЊОЋОю! ОюОљОЕОе ОбОЮ ОћОћОЋОеОЎОЮ?")){return;}
    await fSet("pts/"+kid,p-need);
    var hid=uid();
    await fSet("hist/"+hid,{id:hid,kid:kid,label:"ОцОеОА: "+pr.label,pts:-need,emoji:pr.emoji,time:now(),ts:Date.now()});
    flash("­ЪјЅ "+pr.label+"!","#FFF9E6","#8D6E00");
  },
  rpin:async function(kid){
    if(!confirm("ОюОљОцОА PIN ОЕОю "+gk(kid).name+"?"))return;
    await fDel("pins/"+kid);
    flash("­ЪћЉ PIN ОљОЋОцОА","#EDFAF6","#00714F");
  },
  resetWeek:async function(){
    if(!confirm("ОюОљОцОА ОљОф ОћОЊОЎОеОЋОњ ОћОЕОЉОЋОбОЎ?\n(ОаОДОЋОЊОЋОф ОћОцОеОАОЎОЮ ОюОљ ОЎОЋОЕОцОбОЋ)"))return;
    // ОъОљОцОА ОеОД wpts Рђћ pts ОаОЕОљОеОЎОЮ ОЉОбОЎОаОЮ
    await fSet("wpts",{adar:0,agam:0,ariel:0,itay:0});
    flash("­ЪЈє ОЊОЎОеОЋОњ ОЕОЉОЋОбОЎ ОљОЋОцОА! ОаОДОЋОЊОЋОф ОћОцОеОАОЎОЮ ОаОЕОъОеОЋ РюЁ","#FFF9E6","#8D6E00");
  },
  ra:async function(){
    if(!confirm("ОюОљОцОА ОћОЏОю ОюОњОъОеОЎ?\n(ОњОЮ ОаОДОЋОЊОЋОф ОцОеОАОЎОЮ ОЋОњОЮ ОЊОЎОеОЋОњ ОЕОЉОЋОбОЎ)"))return;
    await fSet("pts",{adar:0,agam:0,ariel:0,itay:0});
    await fSet("wpts",{adar:0,agam:0,ariel:0,itay:0});
    await fSet("pend",null);
    await fSet("hist",null);
    flash("­Ъћё ОћОЏОю ОљОЋОцОА!","#F0EEFF","#6C5CE7");
  },
  dh:async function(id){
    var item=hArr().find(function(x){return x.id===id;});
    if(!item)return;
    await fSet("pts/"+item.kid,Math.max(0,(live.pts[item.kid]||0)-item.pts));
    await fSet("wpts/"+item.kid,Math.max(0,(live.wpts[item.kid]||0)-item.pts));
    await fDel("hist/"+id);
    flash("­ЪЌЉ№ИЈ ОаОъОЌОД","#F0EEFF","#6C5CE7");
  },
  ch:async function(){
    if(!confirm("ОюОъОЌОЋОД ОљОф ОЏОю ОћОћОЎОАОўОЋОеОЎОћ?"))return;
    await fSet("hist",null);
  },
  rep:async function(kid,itemId,cat){
    var items=cat==="task"?TASKS:GOOD;
    var item=items.find(function(x){return x.id===itemId;});
    if(!item)return;
    var pid=uid();
    await fSet("pend/"+pid,{id:pid,kid:kid,type:cat,label:item.label,pts:item.pts,emoji:item.emoji,time:now(),ts:Date.now()});
    flash(item.emoji+" "+item.label+" ОаОЕОюОЌ ОюОљОЎОЕОЋОе РЈ│","#EDFAF6","#00714F");
  }
};
</script>
